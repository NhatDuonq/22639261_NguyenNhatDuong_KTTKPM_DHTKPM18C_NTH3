server:
  port: 8081

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:mariadb://localhost:3306/user_service_db
    username: root
    password: sapassword
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://172.16.54.193:8761/eureka/