server:
  port: 8081

spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: user-service

  datasource:
    url: jdbc:mariadb://localhost:3306/user_service_db
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  rabbitmq:
    host: 172.20.35.147
    port: 5672
    username: admin
    password: admin123

eureka:
  instance:
    prefer-ip-address: true
    ip-address: 172.20.35.172
    # Bắt buộc dùng đúng IP Wi-Fi của máy chứa user-service
    health-check-url-path: /actuator/health
      # Cho phép Eureka bỏ qua việc kiểm tra sức khỏe khắt khe lúc mới bắt đầu
    status-page-url-path: /actuator/info
  client:
    service-url:
      defaultZone: http://172.20.35.147:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*" # Phải có dòng này thì Dashboard mới đọc được dữ liệu
  endpoint:
    health:
      show-details: always