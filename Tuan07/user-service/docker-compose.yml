version: '3.8'

services:
  mariadb:
    image: mariadb:11.4
    container_name: mariadb_user_service
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: user_service_db
      MARIADB_USER: user
      MARIADB_PASSWORD: user123
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mariadb_data:
