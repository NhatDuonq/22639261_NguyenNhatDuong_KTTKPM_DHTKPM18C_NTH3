<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Food Form</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<div class="card shadow">
  <div class="card-header bg-primary text-white">
    <h3 th:text="${food.id == null ? 'Thêm Món Ăn Mới' : 'Cập Nhật Món Ăn'}"></h3>
  </div>
  <div class="card-body">
    <form th:action="@{/admin/foods/save}" th:object="${food}" method="post">
      <input type="hidden" th:field="*{id}">

      <div class="mb-3">
        <label class="form-label">Tên món ăn:</label>
        <input type="text" th:field="*{name}" class="form-control" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
        <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
      </div>

      <div class="mb-3">
        <label class="form-label">Giá tiền:</label>
        <input type="number" th:field="*{price}" class="form-control" th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'">
        <div class="text-danger" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
      </div>

      <div class="mb-3">
        <label class="form-label">Mô tả:</label>
        <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
      </div>

      <div class="mb-3">
        <label class="form-label">Link ảnh (URL):</label>
        <input type="text" th:field="*{imageUrl}" class="form-control">
      </div>

      <div class="mt-4 text-end">
        <a th:href="@{/admin/foods}" class="btn btn-secondary me-2">Hủy</a>
        <button type="submit" class="btn btn-success">Lưu lại</button>
      </div>
    </form>
  </div>
</div>
</body>
</html>
