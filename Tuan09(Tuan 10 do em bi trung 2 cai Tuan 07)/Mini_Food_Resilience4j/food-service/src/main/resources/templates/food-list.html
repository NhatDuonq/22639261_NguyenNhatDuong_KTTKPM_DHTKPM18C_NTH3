<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin - Food Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .food-img {
            width: 80px;
            height: 60px;
            object-fit: cover;
            border-radius: 5px;
        }
    </style>
</head>
<body class="container mt-5">
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Quản lý Thực Đơn (Admin)</h2>
    <a th:href="@{/admin/foods/add}" class="btn btn-primary">Thêm Món Mới</a>
</div>

<table class="table table-hover table-bordered align-middle">
    <thead class="table-dark text-center">
    <tr>
        <th>ID</th>
        <th>Hình ảnh</th> <th>Tên món</th>
        <th>Giá (VNĐ)</th>
        <th>Mô tả</th>
        <th>Hành động</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="food : ${foods}">
        <td class="text-center" th:text="${food.id}"></td>
        <td class="text-center">
            <img th:src="${food.imageUrl != null && food.imageUrl != '' ? food.imageUrl : 'https://via.placeholder.com/80x60?text=No+Image'}"
                 class="food-img" alt="food image">
        </td>
        <td th:text="${food.name}"></td>
        <td class="text-end" th:text="${#numbers.formatDecimal(food.price, 0, 'COMMA', 0, 'POINT')}"></td>
        <td th:text="${food.description}"></td>
        <td class="text-center">
            <a th:href="@{/admin/foods/edit/{id}(id=${food.id})}" class="btn btn-warning btn-sm">Sửa</a>
            <a th:href="@{/admin/foods/delete/{id}(id=${food.id})}"
               class="btn btn-danger btn-sm"
               onclick="return confirm('Bạn chắc chắn muốn xóa?')">Xóa</a>
        </td>
    </tr>
    </tbody>
</table>
<div class="mt-3">
    <a href="/foods" class="btn btn-link">Xem JSON API</a>
</div>
</body>
</html>
