server:
  port: 8082

spring:
  application:
    name: food-service

  datasource:
    url: jdbc:mariadb://localhost:3306/food_db
    username: root
    password: sapassword
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect

logging:
  level:
    edu.iuh.fit.food_service: DEBUG