server:
  port: 8081

spring:
  application:
    name: UserService

  datasource:
    url: jdbc:mariadb://localhost:3306/user_service_db
    username: root
    password: sapassword
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true